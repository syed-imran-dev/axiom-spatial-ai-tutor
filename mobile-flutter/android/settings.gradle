pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"


include ":unityLibrary"
project(":unityLibrary").projectDir = file("./unityLibrary")

// --- AXIOM FINAL INJECTOR ---
gradle.beforeProject { project ->
    project.afterEvaluate {
        if (project.hasProperty('android')) {
            project.android {
                // 1. Force the namespace for all plugins (Fixes LibraryVariant error)
                if (namespace == null) {
                    namespace = project.group ?: "com.axiom.${project.name.replace('-', '_')}"
                }
                // 2. Force Java 11 compatibility (Fixes JVM-target error)
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_11
                    targetCompatibility JavaVersion.VERSION_11
                }
            }
            // 3. Force Kotlin to match Java 11
            project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all {
                kotlinOptions { jvmTarget = "11" }
            }
        }
    }
}
